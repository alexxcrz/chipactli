name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Prepare assets
        working-directory: frontend
        run: npm run prepare-assets || true
      - name: Run tests
        working-directory: frontend
        run: npm run test:run
      - name: Build
        working-directory: frontend
        run: npm run build
