<svg xmlns="http://www.w3.org/2000/svg" width="760" height="120" viewBox="0 0 760 120" role="img" aria-label="Metodos de pago: Visa, MasterCard, PayPal, American Express, OXXO">
  <rect width="760" height="120" fill="none"/>

  <g transform="translate(18,26)" fill="#222">
    <text x="0" y="50" font-size="56" font-weight="900" font-style="italic" font-family="Arial, Helvetica, sans-serif">VISA</text>
  </g>

  <g transform="translate(220,26)">
    <circle cx="28" cy="34" r="22" fill="#111" opacity="0.85"/>
