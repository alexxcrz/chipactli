services:
  - type: web
    name: chipactli
    env: node
    buildCommand: npm install && npm --prefix frontend install --include=dev && npm --prefix frontend run prepare-assets && npm --prefix frontend run build && npm --prefix backend install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: TIENDA_JWT_SECRET
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: VITE_TURNSTILE_SITE_KEY
        sync: false
      - key: DB_DIR
        value: /opt/render/data/backend
      - key: BACKUP_INTERVAL_HOURS
        value: "1"
      - key: BACKUP_INITIAL_DELAY_SEC
        value: "30"
      - key: FRONTEND_URL
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SECURITY_ALERT_WEBHOOK_URL
        sync: false
      - key: SECURITY_ALERT_MIN_LEVEL
        value: error
      - key: SECURITY_ALERT_COOLDOWN_SEC
        value: "300"
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_SUCCESS_URL
        sync: false
      - key: MP_PENDING_URL
        sync: false
      - key: MP_FAILURE_URL
        sync: false
      - key: MAIL_ENABLED
        value: "1"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_SECURE
        value: "1"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: MAIL_LOGO_URL
        sync: false
    # Disco persistente para que las bases de datos no se borren
    disk:
      name: chipactli-data
      mountPath: /opt/render/data
      sizeGB: 1
